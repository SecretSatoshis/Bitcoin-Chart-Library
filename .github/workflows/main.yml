name: Update Bitcoin Charts

on:
  schedule:
    # Runs 10 min after Report Library (16:00 UTC) to ensure fresh data
    - cron:  '10 16 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run the script and update charts
      run: python main.py

    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git pull origin main
        git add Chart_Images/ Charts/
        git commit -m "Update Charts" || echo "No changes to commit"
        git push origin HEAD:main
